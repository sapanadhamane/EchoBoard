<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact | EchoBoard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f6fb;
      color: #333;
    }

    header {
      background-color: #0b075e;
      color: white;
      text-align: center;
      padding: 30px 0;
    }

    .contact-box {
      width: 800px;
      margin: 40px auto;
      padding: 30px;
      background-color: white;
      border: 2px solid #ccc;
      border-radius: 10px;
      box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.7s ease;
    }

    .contact-box h2 {
      margin-top: 0;
      color: #0b075e;
    }

    .contact-box label {
      display: block;
      margin-top: 20px;
      font-weight: bold;
    }

    .contact-box input,
    .contact-box textarea {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-top: 5px;
      border: 1px solid #aaa;
      border-radius: 5px;
      box-sizing: border-box;
    }

    .contact-box textarea {
      resize: none;
    }

    .contact-box button {
      margin-top: 25px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #0b075e;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .contact-box button:hover {
      background-color: #181c6e;
    }

    footer {
      background-color: #0b075e;
      color: white;
      text-align: center;
      padding: 15px 0;
      margin-top: 50px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Contact EchoBoard</h1>
    <p>We’re happy to help you!</p>
  </header>

  <div class="contact-box">
    <h2>Send Us a Message</h2>
    <form action="#" method="POST">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Your Email</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Your Message</label>
      <textarea id="message" name="message" rows="6" required></textarea>

      <button type="submit">Send</button>
    </form>
  </div>

  <footer>
    &copy; 2025 EchoBoard Inc.
  </footer>

</body>
<script>
  document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault(); 
    alert('Your message has been submitted successfully!');
    this.reset(); 
  });
</script>

</html>
